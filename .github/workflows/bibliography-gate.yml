name: Bibliography Gate

on:
  pull_request:
  push:

jobs:
  bibliography-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run bibliography preflight
        run: |
          python scripts/preflight_related_work.py --bib paper/refs.bib --run-external-checks
      - name: Upload bibliography report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: literature_sync_report
          path: analysis/results/literature_sync_report.json
